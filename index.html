<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gift Suggestions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f9f4ee;
  --card:#fff;
  --accent:#b5451b;
  --accent2:#e8763a;
  --gold:#c9913d;
  --text:#1a1008;
  --muted:#8a7460;
  --border:#e8ddd0;
  --input-bg:#fdfaf6;
  --success:#3a7d54;
  --danger:#c0392b;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse at 0% 0%,#fde8d820 0%,transparent 60%),
                   radial-gradient(ellipse at 100% 100%,#f5d8c020 0%,transparent 60%);}

header{text-align:center;padding:48px 20px 32px;position:relative;}
.ribbon{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;
  font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;
  padding:6px 18px;border-radius:2px;margin-bottom:20px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,6vw,3.6rem);font-weight:700;
  line-height:1.1;color:var(--text);}
h1 em{color:var(--accent);font-style:normal;}
.sub{margin-top:10px;color:var(--muted);font-size:14px;font-weight:300;}

.container{max-width:660px;margin:0 auto;padding:0 20px 70px;}

/* status bar */
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:50px;
  padding:9px 20px;margin-bottom:28px;font-size:13px;color:var(--muted);width:fit-content;margin-left:auto;margin-right:auto;}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0;}
.dot.online{background:var(--success);box-shadow:0 0 0 3px #3a7d5420;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px #3a7d5420}50%{box-shadow:0 0 0 6px #3a7d5410}}

/* form card */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:36px 32px;margin-bottom:28px;position:relative;overflow:hidden;
  box-shadow:0 4px 24px #0000000a;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),var(--gold));}

.card-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;
  margin-bottom:26px;display:flex;align-items:center;gap:10px;color:var(--text);}

.fields{display:flex;flex-direction:column;gap:16px;margin-bottom:24px;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);}
.label-row{display:flex;align-items:center;gap:8px;}
.gnum{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;
  font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;}

input[type=text]{background:var(--input-bg);border:1.5px solid var(--border);border-radius:10px;
  padding:13px 16px;color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;
  transition:border-color .2s,box-shadow .2s;outline:none;width:100%;}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px #b5451b18;}
input[type=text]::placeholder{color:#c8b8a4;}

.btn-primary{width:100%;padding:15px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;
  cursor:pointer;transition:background .2s,transform .1s;display:flex;align-items:center;
  justify-content:center;gap:8px;}
.btn-primary:hover{background:#9e3a15;}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}

/* admin */
.admin-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:0;}
.admin-row .field{flex:1;}
.btn-outline{padding:13px 22px;background:transparent;border:1.5px solid var(--accent);
  color:var(--accent);border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;
  font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap;}
.btn-outline:hover{background:var(--accent);color:#fff;}

/* counter */
.counter-section{display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:18px 24px;margin-bottom:20px;box-shadow:0 2px 12px #0000000a;}
.counter-info{display:flex;align-items:center;gap:14px;}
.counter-num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--accent);line-height:1;}
.counter-label{font-size:13px;color:var(--muted);}
.counter-label strong{display:block;color:var(--text);font-size:15px;}

/* entries preview */
.entries-list{display:flex;flex-direction:column;gap:8px;}
.entry-item{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;
  box-shadow:0 1px 6px #0000000a;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.entry-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;display:grid;place-items:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:'Cormorant Garamond',serif;}
.entry-name{font-weight:600;font-size:14px;color:var(--text);}
.entry-gifts{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.gtag{background:#fdf0e8;border:1px solid #e8cbb0;border-radius:5px;padding:2px 9px;
  font-size:12px;color:var(--accent);font-weight:500;}
.entry-time{font-size:11px;color:var(--muted);margin-left:auto;flex-shrink:0;}

/* modal */
.overlay{position:fixed;inset:0;background:#00000050;backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border-radius:20px;padding:36px;max-width:400px;width:100%;
  box-shadow:0 20px 60px #00000025;transform:scale(.95);transition:transform .25s;}
.overlay.open .modal{transform:scale(1);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.btn-cancel{flex:1;padding:13px;background:#f0e8df;color:var(--muted);border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-cancel:hover{background:#e8ddd0;}
.btn-confirm{flex:1;padding:13px;background:var(--success);color:#fff;border:none;
  border-radius:10px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.btn-confirm:hover{background:#2d6b44;}
.err-msg{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px;}

/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--success);color:#fff;padding:12px 24px;border-radius:50px;
  font-size:14px;font-weight:500;opacity:0;pointer-events:none;
  transition:opacity .3s,transform .3s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:var(--danger);}

.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:12px;color:var(--muted);}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:520px){
  .card{padding:24px 18px;}
  .admin-row{flex-direction:column;}
  .btn-outline{width:100%;}
}
</style>
</head>
<body>

<div id="app">
  <div class="loading-screen"><div class="spinner"></div><span>Loading...</span></div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">🔐 Admin Access</div>
    <div class="modal-sub">Enter the password to download all entries as Excel.</div>
    <div class="field">
      <label>Password</label>
      <input type="text" id="modal-pwd" placeholder="Enter password…" autocomplete="off"/>
    </div>
    <div class="err-msg" id="modal-err"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="checkPassword()">Download ⬇</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = '/api/entries';
const PASSWORD = 'Raghu123';
let entries = [];

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  return d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function normalizeRow(row) {
  return {
    id: row.id,
    name: row.name || '',
    g1: row.g1 || '',
    g2: row.g2 || '',
    g3: row.g3 || '',
    time: formatTime(row.created_at),
  };
}

/* ── Storage helpers ── */
async function loadEntries() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('Load failed');
    const rows = await res.json();
    entries = rows.map(normalizeRow);
  } catch { entries = []; }
}

async function createEntry(payload) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
  if (!res.ok) throw new Error('Save failed');
  return normalizeRow(await res.json());
}

/* ── Toast ── */
function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── Add entry ── */
async function addEntry() {
  const name = v('inp-name');
  const g1   = v('inp-g1');
  const g2   = v('inp-g2');
  const g3   = v('inp-g3');
  if (!name) { showToast('⚠ Please enter a name', true); return; }
  if (!g1 && !g2 && !g3) { showToast('⚠ Add at least one gift idea', true); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    const saved = await createEntry({ name, g1, g2, g3 });
    entries.unshift(saved);
    ['inp-name','inp-g1','inp-g2','inp-g3'].forEach(id => document.getElementById(id).value='');
    document.getElementById('inp-name').focus();
    renderApp();
    showToast('✓ Saved! Thanks ' + name + ' 🎁');
  } catch (e) {
    showToast('Storage error — try again', true);
  } finally {
    const b = document.getElementById('btn-add');
    if (b) { b.disabled = false; b.innerHTML = '＋ &nbsp;Submit'; }
  }
}

function v(id){ return document.getElementById(id)?.value.trim()||''; }

/* ── Modal ── */
function openModal(){ document.getElementById('modal-overlay').classList.add('open'); document.getElementById('modal-pwd').focus(); }
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); document.getElementById('modal-pwd').value=''; document.getElementById('modal-err').textContent=''; }

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('modal-pwd').addEventListener('keydown', e => { if(e.key==='Enter') checkPassword(); });
});

function checkPassword() {
  const pwd = document.getElementById('modal-pwd').value;
  if (pwd !== PASSWORD) {
    document.getElementById('modal-err').textContent = '❌ Wrong password. Try again.';
    document.getElementById('modal-pwd').focus();
    return;
  }
  closeModal();
  exportExcel();
}

/* ── Excel export ── */
function exportExcel() {
  const rows = [['#','Name','Gift Suggestion 1','Gift Suggestion 2','Gift Suggestion 3','Time Added']];
  [...entries].reverse().forEach((e,i) => rows.push([i+1, e.name, e.g1||'', e.g2||'', e.g3||'', e.time||'']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:22},{wch:26},{wch:26},{wch:26},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Gift Suggestions');
  XLSX.writeFile(wb, 'gift_suggestions.xlsx');
  showToast('📥 Excel downloaded!');
}

/* ── Render ── */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initial(name){ return name.trim().charAt(0).toUpperCase(); }

function renderApp() {
  const recent = entries.slice(0, 5);
  const doc = document.getElementById('app');
  doc.innerHTML = `
    <header>
      <div class="ribbon">🎁 Group Gift Planner</div>
      <h1>Share Your<br><em>Gift Ideas</em></h1>
      <p class="sub">Everyone fills in — we collect it all in one place</p>
    </header>
    <div class="container">

      <div class="status-bar">
        <span class="dot online"></span>
        <span>Shared — ${entries.length} ${entries.length===1?'response':'responses'} collected</span>
      </div>

      <!-- Submit Form -->
      <div class="card">
        <div class="card-title">✍️ Your Gift Suggestions</div>
        <div class="fields">
          <div class="field">
            <label>Your Name</label>
            <input type="text" id="inp-name" placeholder="e.g. Priya, Rahul, Mom…"/>
          </div>
          <div class="field">
            <div class="label-row"><div class="gnum">1</div><label>Gift Suggestion 1</label></div>
            <input type="text" id="inp-g1" placeholder="e.g. Wireless Earbuds"/>
          </div>
          <div class="field">
            <div class="label-row"><div class="gnum">2</div><label>Gift Suggestion 2</label></div>
            <input type="text" id="inp-g2" placeholder="e.g. Scented Candle Set"/>
          </div>
          <div class="field">
            <div class="label-row"><div class="gnum">3</div><label>Gift Suggestion 3</label></div>
            <input type="text" id="inp-g3" placeholder="e.g. Coffee Table Book"/>
          </div>
        </div>
        <button class="btn-primary" id="btn-add" onclick="addEntry()">＋ &nbsp;Submit</button>
      </div>

      <!-- Admin download -->
      <div class="card" style="padding:24px 32px;">
        <div class="card-title" style="margin-bottom:16px;">🔐 Admin — Download All Data</div>
        <button class="btn-outline" onclick="openModal()" style="width:100%;">⬇ Download Excel Sheet</button>
      </div>

      <!-- Recent entries preview -->
      ${entries.length > 0 ? `
      <div class="counter-section">
        <div class="counter-info">
          <div class="counter-num">${entries.length}</div>
          <div class="counter-label"><strong>Responses</strong>collected so far</div>
        </div>
        <div style="font-size:22px">🎀</div>
      </div>
      <div class="entries-list">
        ${recent.map(e => `
          <div class="entry-item">
            <div class="entry-avatar">${esc(initial(e.name))}</div>
            <div style="flex:1;min-width:0;">
              <div class="entry-name">${esc(e.name)}</div>
              <div class="entry-gifts">
                ${e.g1?`<span class="gtag">${esc(e.g1)}</span>`:''}
                ${e.g2?`<span class="gtag">${esc(e.g2)}</span>`:''}
                ${e.g3?`<span class="gtag">${esc(e.g3)}</span>`:''}
              </div>
            </div>
            <div class="entry-time">${e.time||''}</div>
          </div>
        `).join('')}
        ${entries.length > 5 ? `<div style="text-align:center;padding:10px;font-size:13px;color:var(--muted);">+${entries.length-5} more — download Excel to see all</div>` : ''}
      </div>
      ` : ''}

    </div>
  `;

  // Enter-key navigation
  ['inp-name','inp-g1','inp-g2','inp-g3'].forEach((id,idx,arr) => {
    const el = document.getElementById(id);
    if(!el) return;
    el.addEventListener('keydown', e => {
      if(e.key==='Enter'){
        if(idx < arr.length-1) document.getElementById(arr[idx+1]).focus();
        else addEntry();
      }
    });
  });
}

/* ── Init ── */
(async () => {
  await loadEntries();
  renderApp();
})();
</script>
</body>
</html>
